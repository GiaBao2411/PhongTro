{% extends 'map_app/base.html' %}
{% block title %}Bắt đầu đăng ký{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-header bg-success text-white fw-bold text-center py-3 rounded-top-4">
                    <i class="bi bi-envelope-check fs-4 d-block mb-1"></i> XÁC THỰC EMAIL
                </div>
                <div class="card-body p-4 text-center">
                    <p class="text-muted mb-4">Để đảm bảo an toàn, vui lòng nhập địa chỉ email của bạn. Chúng tôi sẽ gửi một liên kết đăng ký an toàn đến hòm thư này.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold small text-muted">Địa chỉ Email của bạn</label>
                            <input type="email" name="email" class="form-control form-control-lg bg-light" placeholder="ví_dụ: sinhvien@gmail.com" required>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100 fw-bold rounded-pill shadow-sm">Gửi liên kết đăng ký</button>
                    </form>
                    
                    <div class="mt-4 pt-3 border-top">
                        <small class="text-muted">Đã có tài khoản? <a href="{% url 'login' %}" class="fw-bold text-decoration-none">Đăng nhập</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
