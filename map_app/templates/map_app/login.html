{% extends 'map_app/base.html' %}
{% block title %}Đăng Nhập{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white fw-bold text-center">🔐 ĐĂNG NHẬP</div>
                <div class="card-body p-4">
                    {% if form.errors %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert" style="font-size: 0.9rem;">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i>
                            <strong>Đăng nhập thất bại!</strong> Tên đăng nhập hoặc mật khẩu không chính xác.
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="fw-bold">Tên đăng nhập</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Mật khẩu</label>
                            <!-- BỌC Ô PASSWORD LẠI ĐỂ GẮN CON MẮT -->
                            <div class="position-relative">
                                <input type="password" name="password" id="loginPassword" class="form-control pe-5" required>
                                <span class="position-absolute top-50 end-0 translate-middle-y pe-3" style="cursor: pointer; z-index: 10;" onclick="togglePassword('loginPassword', this)">
                                    <i class="bi bi-eye text-muted fs-5"></i>
                                </span>
                            </div>
                            
                            <div class="text-end mt-2">
                                <a href="{% url 'quen_mat_khau' %}" class="text-decoration-none small text-primary fw-bold">
                                    <i class="bi bi-question-circle"></i> Quên mật khẩu?
                                </a>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 fw-bold">ĐĂNG NHẬP</button>
                    </form>
                    <div class="text-center mt-3">
                        Chưa có tài khoản? <a href="{% url 'dang_ky' %}" class="fw-bold">Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ĐOẠN JAVASCRIPT ĐỂ CHỚP MẮT -->
<script>
    function togglePassword(inputId, iconSpan) {
        const input = document.getElementById(inputId);
        const icon = iconSpan.querySelector('i');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
            icon.classList.remove('text-muted');
            icon.classList.add('text-primary'); // Đổi màu khi hiện pass
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
            icon.classList.remove('text-primary');
            icon.classList.add('text-muted');
        }
    }
</script>
{% endblock %}
