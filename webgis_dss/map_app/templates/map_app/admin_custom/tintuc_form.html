{% extends 'map_app/admin_custom/admin_base.html' %}
{% block title %}{{ action }} Tin Tức{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-pencil-fill"></i> {{ action }} Tin Tức</h4>
    <a href="{% url 'custom_admin_tintuc' %}" class="btn btn-outline-secondary fw-bold px-3">
        <i class="bi bi-arrow-left"></i> Quay lại
    </a>
</div>

<div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-4">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label fw-bold">Tiêu đề bài viết</label>
                <input type="text" name="tieu_de" class="form-control" value="{{ tin_tuc.tieu_de }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Ảnh bìa</label>
                <input type="file" name="hinh_anh" class="form-control" accept="image/*" {% if not tin_tuc %}required{% endif %}>
                {% if tin_tuc and tin_tuc.hinh_anh %}
                    <div class="mt-2 text-muted small">Ảnh hiện tại: <a href="{{ tin_tuc.hinh_anh.url }}" target="_blank">Xem ảnh</a></div>
                {% endif %}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Nội dung bài viết</label>
                <textarea name="noi_dung" class="form-control" rows="10" required>{{ tin_tuc.noi_dung }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-success fw-bold px-4 py-2 mt-2">
                <i class="bi bi-save me-1"></i> Lưu Bài Viết
            </button>
        </form>
    </div>
</div>
{% endblock %}
